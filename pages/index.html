<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot API - Raw Chat</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gb: {
                            bgDarkest: '#1d2021',
                            bg: '#282828',
                            bgLight1: '#3c3836',
                            bgLight2: '#504945',
                            bgLight3: '#665c54',
                            fgDark: '#a89984',
                            fgMedium: '#d5c4a1',
                            fgLight: '#ebdbb2',
                            fgLightest: '#fbf1c7',
                            red: '#cc241d',
                            redAccent: '#fb4934',
                            green: '#98971a',
                            greenAccent: '#b8bb26',
                            blue: '#458588',
                            blueAccent: '#83a598',
                            aquaAccent: '#8ec07c'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: "Inter", sans-serif;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom prose adjustments for Gruvbox */
        .prose-gruvbox {
            --tw-prose-body: #ebdbb2;
            --tw-prose-headings: #fbf1c7;
            --tw-prose-lead: #d5c4a1;
            --tw-prose-links: #83a598;
            --tw-prose-bold: #fbf1c7;
            --tw-prose-counters: #a89984;
            --tw-prose-bullets: #a89984;
            --tw-prose-hr: #504945;
            --tw-prose-quotes: #ebdbb2;
            --tw-prose-quote-borders: #83a598;
            --tw-prose-captions: #a89984;
            --tw-prose-code: #8ec07c;
            --tw-prose-pre-code: #ebdbb2;
            --tw-prose-pre-bg: #1d2021;
            --tw-prose-th-borders: #504945;
            --tw-prose-td-borders: #3c3836;
            --tw-prose-invert-body: #ebdbb2;
            --tw-prose-invert-headings: #fbf1c7;
            --tw-prose-invert-lead: #d5c4a1;
            --tw-prose-invert-links: #83a598;
            --tw-prose-invert-bold: #fbf1c7;
            --tw-prose-invert-counters: #a89984;
            --tw-prose-invert-bullets: #a89984;
            --tw-prose-invert-hr: #504945;
            --tw-prose-invert-quotes: #ebdbb2;
            --tw-prose-invert-quote-borders: #83a598;
            --tw-prose-invert-captions: #a89984;
            --tw-prose-invert-code: #8ec07c;
            --tw-prose-invert-pre-code: #ebdbb2;
            --tw-prose-invert-pre-bg: #1d2021;
            --tw-prose-invert-th-borders: #504945;
            --tw-prose-invert-td-borders: #3c3836;
        }
        /* Fix code block backgrounds and wrapping in markdown */
        .prose pre {
            background-color: #1d2021 !important;
            border: 1px solid #3c3836;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            overflow-x: hidden;
        }
        .prose code {
            white-space: pre-wrap !important;
            word-break: break-word !important;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="h-screen flex bg-gb-bgDarkest text-gb-fgLight font-sans overflow-hidden">

    <!-- Sidebar (Prior Chats Pane) -->
    <aside id="sidebar" class="w-64 bg-gb-bg border-r border-gb-bgLight2 flex flex-col shrink-0 h-full z-20 transition-all duration-300">
        <!-- Sidebar Header with New Chat -->
        <div class="p-4 border-b border-gb-bgLight2 flex flex-col gap-3">
            <button id="new-chat-btn" class="w-full bg-gb-blue hover:bg-gb-blueAccent text-gb-bgDarkest font-bold py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-all duration-300 shadow-md hover:scale-[1.02] active:scale-95">
                <i data-lucide="plus" class="w-5 h-5"></i> New Chat
            </button>
        </div>
        <!-- Scrollable Conversation list -->
        <div id="conv-list" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2 scrollbar-hide">
            <!-- Dynamically populated via JS -->
        </div>
        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-gb-bgLight2 text-xs text-gb-fgDark flex justify-between items-center bg-[#1d2021]">
            <span class="font-medium">Saved Threads</span>
            <button id="clear-all-convs-btn" class="hover:text-gb-redAccent transition-colors flex items-center gap-1 font-semibold hover:scale-105">
                <i data-lucide="trash" class="w-3.5 h-3.5"></i> Clear All
            </button>
        </div>
    </aside>

    <!-- Main chat workspace -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Header -->
        <header class="bg-gb-bg border-b border-gb-bgLight2 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center shrink-0 z-10 shadow-sm gap-4">
            <div class="flex items-center gap-3 font-bold text-gb-fgLightest text-lg">
                <i data-lucide="server" class="w-6 h-6 text-gb-aquaAccent"></i>
                <span>Copilot API Chat</span>
            </div>
            <div class="flex items-center gap-6 w-full sm:w-auto justify-between sm:justify-end">
                <div class="flex flex-col">
                    <label class="text-xs text-gb-fgDark font-semibold mb-1 uppercase tracking-wider flex justify-between">
                        Model Selection
                        <span id="quota-display" class="text-gb-blueAccent font-mono ml-4">Fetching quota...</span>
                    </label>
                    <select id="model-select" class="bg-gb-bgDarkest border border-gb-bgLight2 text-gb-fgLight text-sm rounded focus:ring-gb-blueAccent focus:border-gb-blueAccent block w-full sm:w-64 p-2 shadow-sm font-medium outline-none">
                        <option value="">Loading models...</option>
                    </select>                </div>
                <button id="clear-btn" class="mt-4 text-gb-fgDark hover:text-gb-redAccent flex items-center gap-1 text-sm font-semibold transition-colors hover:scale-105 active:scale-95">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Clear Current
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <main id="chat-container" class="flex-1 overflow-y-auto p-6 flex flex-col items-center">
            <!-- Messages will be injected here -->
        </main>

        <!-- Input Area -->
        <footer class="bg-gb-bg border-t border-gb-bgLight2 p-4 shrink-0">
            <div class="max-w-5xl mx-auto flex flex-col gap-2">
                <div class="flex justify-between items-center px-1">
                    <span id="token-count" class="text-xs text-gb-fgDark font-semibold uppercase tracking-wider">0 / 100,000 tokens</span>
                    <span class="text-xs text-gb-bgLight3 font-medium">Ctrl + Enter to send</span>
                </div>
                <div class="flex gap-4 items-end">
                    <textarea id="prompt-input" rows="5" class="w-full bg-gb-bgDarkest border border-gb-bgLight2 text-gb-fgLight text-sm rounded-lg focus:ring-1 focus:ring-gb-blueAccent focus:border-gb-blueAccent outline-none p-4 resize-y font-mono shadow-inner placeholder-gb-bgLight3" placeholder="Enter prompt here..."></textarea>
                    <div class="flex flex-col gap-2 shrink-0">
                        <button id="continue-btn" class="bg-gb-bgLight2 hover:bg-gb-bgLight3 text-gb-fgLight font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-all duration-300 justify-center whitespace-nowrap shadow-md hover:scale-[1.02] active:scale-95">
                            <i data-lucide="play" class="w-4 h-4 text-gb-aquaAccent"></i> Continue
                        </button>
                        <button id="send-btn" class="bg-gb-blue hover:bg-gb-blueAccent text-gb-bgDarkest font-bold py-4 px-8 rounded-lg flex items-center gap-2 transition-all duration-300 h-full whitespace-nowrap shadow-md hover:scale-[1.02] active:scale-95">
                            <i data-lucide="send" class="w-5 h-5"></i> Send
                        </button>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- Custom sliding Confirm Modal Overlay -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <!-- Modal Box -->
        <div id="confirm-modal-box" class="bg-gb-bg border border-gb-bgLight2 rounded-xl max-w-md w-full p-6 shadow-2xl transform translate-y-8 transition-all duration-300 flex flex-col gap-4">
            <div class="flex items-center gap-3 text-gb-redAccent font-bold text-lg">
                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                <span id="modal-title">Confirm Action</span>
            </div>
            <p id="modal-text" class="text-sm text-gb-fgMedium leading-relaxed">Are you sure you want to proceed?</p>
            <div class="flex justify-end gap-3 mt-2">
                <button id="modal-cancel-btn" class="px-4 py-2 rounded bg-gb-bgLight1 hover:bg-gb-bgLight2 text-gb-fgLight text-sm font-semibold transition-colors">Cancel</button>
                <button id="modal-confirm-btn" class="px-4 py-2 rounded bg-gb-red hover:bg-gb-redAccent text-gb-bgDarkest text-sm font-bold transition-all transform hover:scale-105 active:scale-95">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY_CONVS = 'copilot_conversations_v3';
        const STORAGE_KEY_ACTIVE = 'copilot_active_conv_v3';
        const STORAGE_KEY_MODEL = 'copilot_chat_model_v1';
        const TOKEN_LIMIT = 100000;

        let conversations = JSON.parse(localStorage.getItem(STORAGE_KEY_CONVS) || '[]');
        let activeConvId = localStorage.getItem(STORAGE_KEY_ACTIVE) || '';
        let selectedModel = localStorage.getItem(STORAGE_KEY_MODEL) || '';

        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const continueBtn = document.getElementById('continue-btn');
        const tokenCount = document.getElementById('token-count');
        const modelSelect = document.getElementById('model-select');
        const clearBtn = document.getElementById('clear-btn');
        const quotaDisplay = document.getElementById('quota-display');
        const convList = document.getElementById('conv-list');
        const newChatBtn = document.getElementById('new-chat-btn');
        const clearAllConvsBtn = document.getElementById('clear-all-convs-btn');

        // Custom sliding confirm modal logic
        let activeConfirmCallback = null;

        function showConfirmModal(title, text, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            const box = document.getElementById('confirm-modal-box');
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-text').textContent = text;
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('translate-y-8');
            box.classList.add('translate-y-0');
            
            activeConfirmCallback = () => {
                onConfirm();
                closeConfirmModal();
            };
            lucide.createIcons();
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            const box = document.getElementById('confirm-modal-box');
            modal.classList.add('opacity-0', 'pointer-events-none');
            box.classList.remove('translate-y-0');
            box.classList.add('translate-y-8');
            activeConfirmCallback = null;
        }

        document.getElementById('modal-cancel-btn').onclick = closeConfirmModal;
        document.getElementById('modal-confirm-btn').onclick = () => {
            if (activeConfirmCallback) activeConfirmCallback();
        };

        // Initialize marked options
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        function initConversations() {
            if (conversations.length === 0) {
                createNewChat();
            } else {
                if (!activeConvId || !conversations.some(c => c.id === activeConvId)) {
                    activeConvId = conversations[0].id;
                }
                saveConversations();
            }
        }

        function createNewChat() {
            const id = 'conv_' + Date.now();
            conversations.unshift({
                id: id,
                title: 'New Chat',
                messages: []
            });
            activeConvId = id;
            saveConversations();
            renderSidebar();
            renderChat();
        }

        function saveConversations() {
            localStorage.setItem(STORAGE_KEY_CONVS, JSON.stringify(conversations));
            localStorage.setItem(STORAGE_KEY_ACTIVE, activeConvId);
        }

        function getActiveConversation() {
            return conversations.find(c => c.id === activeConvId);
        }

        function saveHistory() {
            const active = getActiveConversation();
            if (active) {
                if (active.title === 'New Chat' && active.messages.length > 0) {
                    const firstUser = active.messages.find(m => m.role === 'user');
                    if (firstUser) {
                        const sliced = firstUser.content.slice(0, 30);
                        active.title = sliced + (firstUser.content.length > 30 ? '...' : '');
                    }
                }
                saveConversations();
                renderSidebar();
            }
        }

        function deleteConversation(id) {
            conversations = conversations.filter(c => c.id !== id);
            if (activeConvId === id) {
                activeConvId = conversations.length > 0 ? conversations[0].id : '';
            }
            initConversations();
            saveConversations();
            renderSidebar();
            renderChat();
        }

        function countTokens(text) {
            return Math.ceil((text || '').length / 4);
        }

        let tokenCalcTimeout = null;
        function updateTokenCount() {
            const text = promptInput.value;
            const active = getActiveConversation();
            const history = active ? active.messages : [];
            
            let roughTokens = countTokens(text);
            history.forEach(m => roughTokens += countTokens(m.content));
            
            tokenCount.textContent = `${roughTokens.toLocaleString()} / ${TOKEN_LIMIT.toLocaleString()} tokens (est.)`;
            
            clearTimeout(tokenCalcTimeout);
            tokenCalcTimeout = setTimeout(async () => {
                try {
                    const tempMessages = [...history];
                    if (text.trim()) {
                        tempMessages.push({ role: 'user', content: text });
                    }
                    
                    if (tempMessages.length === 0) {
                        tokenCount.textContent = `0 / ${TOKEN_LIMIT.toLocaleString()} tokens`;
                        return;
                    }

                    const res = await fetch('/v1/count_tokens', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: selectedModel || 'gpt-4o',
                            messages: tempMessages
                        })
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        const exactTokens = data.total_tokens;
                        tokenCount.textContent = `${exactTokens.toLocaleString()} / ${TOKEN_LIMIT.toLocaleString()} tokens`;
                        
                        if (exactTokens > TOKEN_LIMIT) {
                            tokenCount.className = 'text-xs text-gb-redAccent font-bold uppercase tracking-wider';
                            sendBtn.disabled = true;
                            sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
                            continueBtn.disabled = true;
                            continueBtn.classList.add('opacity-50', 'cursor-not-allowed');
                        } else {
                            tokenCount.className = 'text-xs text-gb-fgDark font-semibold uppercase tracking-wider';
                            sendBtn.disabled = false;
                            sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                            continueBtn.disabled = false;
                            continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        }
                    }
                } catch (e) {
                    console.error("Token calculation failed", e);
                }
            }, 500);
        }

        function getPricingMultiplier(modelId) {
            const id = modelId.toLowerCase();
            if (id.includes('flash') || id.includes('mini') || id.includes('haiku')) return '0.33x';
            if (id.includes('opus')) return '3x';
            if (id.includes('sonnet') || id.includes('pro')) return '1x';
            return '1x';
        }

        async function fetchModels() {
            try {
                const res = await fetch('/v1/models');
                const data = await res.json();
                const models = data.data || [];
                
                modelSelect.innerHTML = '';
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    const mult = getPricingMultiplier(m.id);
                    opt.textContent = `${m.id} (${mult})`;
                    modelSelect.appendChild(opt);
                });

                if (selectedModel && models.some(m => m.id === selectedModel)) {
                    modelSelect.value = selectedModel;
                } else if (models.length > 0) {
                    modelSelect.value = models[0].id;
                    selectedModel = models[0].id;
                    localStorage.setItem(STORAGE_KEY_MODEL, selectedModel);
                }
            } catch (e) {
                console.error('Failed to fetch models', e);
                modelSelect.innerHTML = '<option value="">Error loading models</option>';
            }
        }

        async function fetchQuota() {
            try {
                const res = await fetch('/usage');
                if(!res.ok) throw new Error("Quota fetch failed");
                const data = await res.json();
                const chat = data.quota_snapshots?.chat;
                const comp = data.quota_snapshots?.completions;
                
                let text = [];
                if(chat) {
                    const used = chat.unlimited ? '∞' : chat.entitlement - chat.remaining;
                    const total = chat.unlimited ? '∞' : chat.entitlement;
                    text.push(`Chat: ${used}/${total}`);
                }
                if(comp) {
                    const used = comp.unlimited ? '∞' : comp.entitlement - comp.remaining;
                    const total = comp.unlimited ? '∞' : comp.entitlement;
                    text.push(`Comp: ${used}/${total}`);
                }
                quotaDisplay.textContent = text.join(' | ') || 'No quota info';
            } catch (e) {
                console.error(e);
                quotaDisplay.textContent = 'Quota unavailable';
            }
        }

        modelSelect.addEventListener('change', (e) => {
            selectedModel = e.target.value;
            localStorage.setItem(STORAGE_KEY_MODEL, selectedModel);
        });

        promptInput.addEventListener('input', updateTokenCount);

        clearBtn.addEventListener('click', () => {
            const active = getActiveConversation();
            if (active) {
                showConfirmModal('Clear Current Thread', 'Are you sure you want to clear all messages in this thread?', () => {
                    active.messages = [];
                    active.title = 'New Chat';
                    saveHistory();
                    renderChat();
                    updateTokenCount();
                });
            }
        });

        clearAllConvsBtn.addEventListener('click', () => {
            showConfirmModal('Delete All Chats', 'Are you absolutely sure you want to delete ALL conversations? This cannot be undone.', () => {
                conversations = [];
                activeConvId = '';
                initConversations();
                saveConversations();
                renderSidebar();
                renderChat();
                updateTokenCount();
            });
        });

        newChatBtn.addEventListener('click', createNewChat);

        // Cross-browser reliable copy utilizing execCommand as fallback for tricky security contexts
        async function copyTextToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (err) {
                    console.warn("Clipboard API failed, trying fallback...", err);
                }
            }
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                textArea.remove();
                return true;
            } catch (err) {
                console.error('Fallback clipboard failed', err);
                textArea.remove();
                return false;
            }
        }

        function createMessageActions(msg, index, isUser, isError, contentDiv) {
            const container = document.createElement('div');
            container.className = 'flex items-center gap-2 flex-wrap';
            
            if (isUser) {
                const rerunBtn = document.createElement('button');
                rerunBtn.className = 'flex items-center gap-1.5 text-xs text-gb-fgDark hover:text-gb-greenAccent transition-all bg-gb-bgDarkest hover:bg-gb-bgLight1 px-3 py-1.5 rounded border border-gb-bgLight2 font-semibold hover:scale-105';
                rerunBtn.innerHTML = `<i data-lucide="refresh-cw" class="w-4 h-4"></i> Re-run`;
                rerunBtn.onclick = () => {
                    const active = getActiveConversation();
                    if (active) {
                        const idx = active.messages.indexOf(msg);
                        if (idx > -1) {
                            showConfirmModal('Re-run Prompt', 'Re-running this prompt will permanently discard all subsequent messages in this thread. Proceed?', () => {
                                active.messages = active.messages.slice(0, idx + 1);
                                saveHistory();
                                renderChat();
                                triggerAPI();
                            });
                        }
                    }
                };
                container.appendChild(rerunBtn);
            }

            const editBtn = document.createElement('button');
            editBtn.className = `edit-btn-${index} flex items-center gap-1.5 text-xs text-gb-fgDark hover:text-gb-blueAccent transition-all bg-gb-bgDarkest hover:bg-gb-bgLight1 px-3 py-1.5 rounded border border-gb-bgLight2 font-semibold hover:scale-105`;
            editBtn.innerHTML = `<i data-lucide="edit-2" class="w-4 h-4"></i> Edit`;
            
            editBtn.onclick = () => {
                const isEditing = contentDiv.querySelector('.edit-textarea') !== null;
                if (!isEditing) {
                    const currentText = msg.content || '';
                    contentDiv.innerHTML = '';
                    const editTextArea = document.createElement('textarea');
                    editTextArea.className = 'edit-textarea w-full bg-gb-bgDarkest border border-gb-bgLight2 text-gb-fgLight text-sm rounded-lg focus:ring-1 focus:ring-gb-blueAccent outline-none p-4 font-mono resize-y mt-2';
                    editTextArea.rows = Math.max(3, currentText.split('\n').length);
                    editTextArea.value = currentText;
                    contentDiv.appendChild(editTextArea);

                    document.querySelectorAll(`.edit-btn-${index}`).forEach(btn => {
                        btn.innerHTML = `<i data-lucide="save" class="w-4 h-4 text-gb-greenAccent"></i> Save`;
                        btn.classList.replace('hover:text-gb-blueAccent', 'hover:text-gb-greenAccent');
                    });
                    lucide.createIcons();
                } else {
                    const editTextArea = contentDiv.querySelector('.edit-textarea');
                    if (editTextArea) {
                        msg.content = editTextArea.value;
                        saveHistory();
                        renderChat();
                        updateTokenCount();
                    }
                }
            };
            container.appendChild(editBtn);

            if (!isError && msg.content) {
                const copyBtn = document.createElement('button');
                copyBtn.className = `copy-btn-${index} flex items-center gap-1.5 text-xs text-gb-fgDark hover:text-gb-blueAccent transition-all bg-gb-bgDarkest hover:bg-gb-bgLight1 px-3 py-1.5 rounded border border-gb-bgLight2 font-semibold hover:scale-105`;
                copyBtn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i> Copy Raw`;
                copyBtn.onclick = async () => {
                    const success = await copyTextToClipboard(msg.content);
                    if (success) {
                        document.querySelectorAll(`.copy-btn-${index}`).forEach(btn => {
                            btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-gb-greenAccent"></i> Copied`;
                            btn.classList.replace('hover:text-gb-blueAccent', 'hover:text-gb-greenAccent');
                        });
                        lucide.createIcons();
                        setTimeout(() => {
                            document.querySelectorAll(`.copy-btn-${index}`).forEach(btn => {
                                btn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i> Copy Raw`;
                                btn.classList.replace('hover:text-gb-greenAccent', 'hover:text-gb-blueAccent');
                            });
                            lucide.createIcons();
                        }, 2000);
                    }
                };
                container.appendChild(copyBtn);
            }

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'flex items-center gap-1.5 text-xs text-gb-fgDark hover:text-gb-redAccent transition-all bg-gb-bgDarkest hover:bg-gb-bgLight1 px-3 py-1.5 rounded border border-gb-bgLight2 font-semibold hover:scale-105';
            deleteBtn.innerHTML = `<i data-lucide="trash-2" class="w-4 h-4"></i> Delete`;
            deleteBtn.onclick = () => {
                showConfirmModal('Delete Message', 'Are you sure you want to delete this specific message from the history?', () => {
                    const active = getActiveConversation();
                    if (active) {
                        const idx = active.messages.indexOf(msg);
                        if (idx > -1) {
                            active.messages.splice(idx, 1);
                            saveHistory();
                            renderChat();
                            updateTokenCount();
                        }
                    }
                });
            };
            container.appendChild(deleteBtn);

            return container;
        }

        function createMessageElement(msg, index) {
            const isUser = msg.role === 'user';
            const isError = msg.isError === true;
            const div = document.createElement('div');
            div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'} mb-6 animate-fade-in-up`;
            
            let bgClass = isUser ? 'bg-gb-bgLight1 border-gb-bgLight3' : 'bg-gb-bg border-gb-bgLight2';
            if (isError) bgClass = 'bg-[#321c1a] border-gb-redAccent'; 
            
            const inner = document.createElement('div');
            inner.className = `max-w-5xl w-full flex flex-col gap-3 p-5 rounded-lg border shadow-sm ${bgClass} transition-all duration-300 hover:shadow-md`;
            
            const header = document.createElement('div');
            header.className = 'flex justify-between items-center border-b pb-3 mb-1 border-gb-bgLight2 text-sm font-bold uppercase tracking-wide text-gb-fgMedium';
            
            const roleDiv = document.createElement('div');
            roleDiv.className = 'flex items-center gap-2';
            
            if (isError) {
                roleDiv.innerHTML = `<i data-lucide="alert-triangle" class="w-5 h-5 text-gb-redAccent"></i> <span class="text-gb-redAccent">Error</span>`;
            } else {
                roleDiv.innerHTML = `<i data-lucide="${isUser ? 'user' : 'bot'}" class="w-5 h-5 ${isUser ? 'text-gb-blueAccent' : 'text-gb-aquaAccent'}"></i> <span>${isUser ? 'User Request' : 'AI Output'}</span>`;
            }
            header.appendChild(roleDiv);
            
            const content = document.createElement('div');
            content.id = `msg-content-${index}`;
            
            if (isUser || isError) {
                content.className = 'whitespace-pre-wrap font-mono text-sm text-gb-fgLight break-words leading-relaxed';
                if (isUser) {
                    const tokens = countTokens(msg.content);
                    if (tokens > 1000) {
                        content.innerHTML = `<div class="italic text-gb-fgDark flex items-center gap-2 bg-gb-bgDarkest p-3 rounded border border-gb-bgLight2"><i data-lucide="file-text" class="w-4 h-4"></i> Long message : ${tokens.toLocaleString()} Tokens</div>`;
                    } else {
                        content.textContent = msg.content;
                    }
                } else {
                    content.textContent = msg.content;
                }
            } else {
                if (!msg.content) {
                    content.className = 'flex items-center gap-2 text-gb-aquaAccent font-semibold animate-pulse py-2';
                    content.innerHTML = `
                        <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                        <span>Thinking...</span>
                    `;
                } else {
                    content.className = 'prose prose-invert prose-gruvbox max-w-none text-sm break-words leading-relaxed';
                    content.innerHTML = marked.parse(msg.content);
                }
            }
            
            const topActions = createMessageActions(msg, index, isUser, isError, content);
            header.appendChild(topActions);
            
            inner.appendChild(header);
            inner.appendChild(content);

            const footer = document.createElement('div');
            footer.className = 'flex justify-end pt-3 mt-2 border-t border-gb-bgLight2';
            const bottomActions = createMessageActions(msg, index, isUser, isError, content);
            footer.appendChild(bottomActions);
            inner.appendChild(footer);
            
            div.appendChild(inner);
            return div;
        }

        function renderSidebar() {
            convList.innerHTML = '';
            conversations.forEach(conv => {
                const isActive = conv.id === activeConvId;
                const item = document.createElement('div');
                item.className = `group flex justify-between items-center p-3 rounded-lg cursor-pointer transition-all duration-300 sidebar-item ${
                    isActive 
                    ? 'bg-gb-bgLight1 border border-gb-bgLight3 text-gb-fgLightest shadow-sm scale-[1.02]' 
                    : 'text-gb-fgDark hover:bg-gb-bgLight1/40 hover:text-gb-fgLight hover:translate-x-1'
                }`;
                
                const left = document.createElement('div');
                left.className = 'flex items-center gap-2 overflow-hidden flex-1';
                left.innerHTML = `<i data-lucide="message-square" class="w-4 h-4 shrink-0 ${isActive ? 'text-gb-aquaAccent' : 'opacity-60'}"></i>`;
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'text-sm truncate font-medium';
                titleSpan.textContent = conv.title;
                left.appendChild(titleSpan);
                
                left.onclick = () => {
                    activeConvId = conv.id;
                    saveConversations();
                    renderSidebar();
                    renderChat();
                    updateTokenCount();
                };
                item.appendChild(left);
                
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all shrink-0';

                const editBtn = document.createElement('button');
                editBtn.className = 'text-gb-fgDark hover:text-gb-blueAccent transition-all p-1 rounded hover:bg-gb-bgLight2 hover:scale-110';
                editBtn.innerHTML = `<i data-lucide="edit-2" class="w-3.5 h-3.5"></i>`;
                
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'text-sm font-medium bg-gb-bgDarkest text-gb-fgLight border border-gb-blueAccent rounded px-1 outline-none w-full mr-2';
                    input.value = conv.title;
                    
                    input.onclick = (ev) => ev.stopPropagation();
                    input.onkeydown = (ev) => {
                        if (ev.key === 'Enter') input.blur();
                        if (ev.key === 'Escape') {
                            input.value = conv.title;
                            input.blur();
                        }
                    };
                    input.onblur = () => {
                        conv.title = input.value.trim() || 'Untitled';
                        saveConversations();
                        renderSidebar();
                    };
                    
                    left.replaceChild(input, titleSpan);
                    input.focus();
                };

                const delBtn = document.createElement('button');
                delBtn.className = 'text-gb-fgDark hover:text-gb-redAccent transition-all p-1 rounded hover:bg-gb-bgLight2 hover:scale-110';
                delBtn.innerHTML = `<i data-lucide="trash-2" class="w-3.5 h-3.5"></i>`;
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    showConfirmModal('Delete Thread', `Are you sure you want to delete the thread "${conv.title}"?`, () => {
                        deleteConversation(conv.id);
                    });
                };
                
                actionsDiv.appendChild(editBtn);
                actionsDiv.appendChild(delBtn);
                item.appendChild(actionsDiv);
                
                convList.appendChild(item);
            });
            lucide.createIcons();
        }

        function renderChat() {
            chatContainer.innerHTML = '';
            const active = getActiveConversation();
            const history = active ? active.messages : [];
            
            if (history.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'flex flex-col items-center justify-center h-full text-gb-bgLight3 gap-4 mt-20 animate-fade-in-up';
                empty.innerHTML = `<i data-lucide="message-square-dashed" class="w-16 h-16 opacity-50"></i><p class="font-medium text-gb-fgDark">No chat history. Start a conversation below.</p>`;
                chatContainer.appendChild(empty);
            } else {
                history.forEach((msg, i) => {
                    chatContainer.appendChild(createMessageElement(msg, i));
                });
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
            lucide.createIcons();
        }

        async function handleSend() {
            const text = promptInput.value.trim();
            if (!text) return;
            
            const tokens = countTokens(text);
            if (tokens > TOKEN_LIMIT) return;

            const active = getActiveConversation();
            if (!active) return;

            const userMsg = { role: 'user', content: text };
            active.messages.push(userMsg);
            promptInput.value = '';
            updateTokenCount();
            
            await triggerAPI();
        }

        async function triggerAPI() {
            const active = getActiveConversation();
            if (!active) return;
            
            const assistantIndex = active.messages.length;
            const assistantMsg = { role: 'assistant', content: '' };
            active.messages.push(assistantMsg);
            
            saveHistory();
            renderChat();
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin text-gb-bgDarkest"></i> Processing`;
            continueBtn.disabled = true;
            continueBtn.classList.add('opacity-50', 'cursor-not-allowed');
            lucide.createIcons();

            try {
                const cleanHistory = active.messages.slice(0, -1).filter(m => !m.isError);

                const res = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: cleanHistory,
                        stream: true,
                        max_tokens: 16384
                    })
                });

                if (!res.ok) {
                    let errMsg = `Server returned HTTP ${res.status}`;
                    try {
                        const errData = await res.json();
                        if (errData.error && errData.error.message) {
                            errMsg = errData.error.message;
                        } else {
                            errMsg = JSON.stringify(errData, null, 2);
                        }
                    } catch(e) {
                        errMsg = await res.text();
                    }
                    throw new Error(errMsg);
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder("utf-8");
                const contentEl = document.getElementById(`msg-content-${assistantIndex}`);
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    
                    let boundary = buffer.indexOf('\n');
                    while (boundary !== -1) {
                        const line = buffer.slice(0, boundary).trim();
                        buffer = buffer.slice(boundary + 1);
                        
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(dataStr);
                                const delta = parsed.choices?.[0]?.delta?.content || '';
                                if (delta) {
                                    if (!assistantMsg.content) {
                                        contentEl.className = 'prose prose-invert prose-gruvbox max-w-none text-sm break-words leading-relaxed';
                                        contentEl.innerHTML = '';
                                    }
                                    assistantMsg.content += delta;
                                    contentEl.innerHTML = marked.parse(assistantMsg.content);
                                    
                                    const isScrolledToBottom = chatContainer.scrollHeight - chatContainer.clientHeight <= chatContainer.scrollTop + 100;
                                    if(isScrolledToBottom) {
                                        chatContainer.scrollTop = chatContainer.scrollHeight;
                                    }
                                }
                            } catch (e) {
                                // safely ignore partials
                            }
                        }
                        boundary = buffer.indexOf('\n');
                    } 
                }
            } catch (e) {
                active.messages[assistantIndex] = {
                    role: 'assistant',
                    content: e.message,
                    isError: true
                };
                renderChat();
            } finally {
                saveHistory();
                renderChat(); 
                updateTokenCount();
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<i data-lucide="send" class="w-5 h-5 text-gb-bgDarkest"></i> Send`;
                continueBtn.disabled = false;
                continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                lucide.createIcons();
                fetchQuota();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        continueBtn.addEventListener('click', () => {
            promptInput.value = "Please continue exactly where you left off, preserving any open code blocks or formatting.";
            handleSend();
        });
        promptInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                handleSend();
            }
        });

        // Init
        initConversations();
        fetchModels();
        fetchQuota();
        renderSidebar();
        renderChat();
        updateTokenCount();
        lucide.createIcons();
    </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot API - Raw Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex flex-col bg-slate-50 text-slate-900 font-sans overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-10 shadow-sm">
        <div class="flex items-center gap-3 font-bold text-slate-800 text-lg">
            <i data-lucide="server" class="w-6 h-6 text-blue-600"></i>
            <span>Copilot API Raw Chat</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <label class="text-xs text-slate-500 font-semibold mb-1 uppercase tracking-wider">Model Selection</label>
                <select id="model-select" class="bg-slate-50 border border-slate-300 text-slate-800 text-sm rounded focus:ring-blue-500 focus:border-blue-500 block w-64 p-2 shadow-sm font-medium">
                    <option value="">Loading models...</option>
                </select>
            </div>
            <button id="clear-btn" class="mt-4 text-slate-500 hover:text-red-600 flex items-center gap-1 text-sm font-semibold transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Clear History
            </button>
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-6 flex flex-col items-center">
        <!-- Messages will be injected here -->
    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-slate-200 p-4 shrink-0 shadow-[0_-4px_6px_-1px_rgb(0,0,0,0.05)]">
        <div class="max-w-5xl mx-auto flex flex-col gap-2">
            <div class="flex justify-between items-center px-1">
                <span id="token-count" class="text-xs text-slate-500 font-semibold uppercase tracking-wider">0 / 100,000 tokens</span>
                <span class="text-xs text-slate-400 font-medium">Ctrl + Enter to send</span>
            </div>
            <div class="flex gap-4 items-end">
                <textarea id="prompt-input" rows="5" class="w-full bg-slate-50 border border-slate-300 text-slate-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-4 resize-y font-mono shadow-inner" placeholder="Enter raw text prompt here..."></textarea>
                <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-lg flex items-center gap-2 transition-colors h-full whitespace-nowrap shadow-md">
                    <i data-lucide="send" class="w-5 h-5"></i> Send
                </button>
            </div>
        </div>
    </footer>

    <script>
        const STORAGE_KEY_HISTORY = 'copilot_chat_history_v1';
        const STORAGE_KEY_MODEL = 'copilot_chat_model_v1';
        const TOKEN_LIMIT = 100000;

        let chatHistory = JSON.parse(localStorage.getItem(STORAGE_KEY_HISTORY) || '[]');
        let selectedModel = localStorage.getItem(STORAGE_KEY_MODEL) || '';

        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const tokenCount = document.getElementById('token-count');
        const modelSelect = document.getElementById('model-select');
        const clearBtn = document.getElementById('clear-btn');

        function saveHistory() {
            localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(chatHistory));
        }

        function countTokens(text) {
            return Math.ceil(text.length / 4);
        }

        function updateTokenCount() {
            const tokens = countTokens(promptInput.value);
            tokenCount.textContent = `${tokens.toLocaleString()} / ${TOKEN_LIMIT.toLocaleString()} tokens`;
            if (tokens > TOKEN_LIMIT) {
                tokenCount.className = 'text-xs text-red-600 font-bold uppercase tracking-wider';
                sendBtn.disabled = true;
                sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                tokenCount.className = 'text-xs text-slate-500 font-semibold uppercase tracking-wider';
                sendBtn.disabled = false;
                sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function getPricingMultiplier(modelId) {
            const id = modelId.toLowerCase();
            if (id.includes('flash') || id.includes('mini') || id.includes('haiku')) return '0.33x';
            if (id.includes('opus')) return '3x';
            if (id.includes('sonnet') || id.includes('pro')) return '1x';
            return '1x';
        }

        async function fetchModels() {
            try {
                const res = await fetch('/v1/models');
                const data = await res.json();
                const models = data.data || [];
                
                modelSelect.innerHTML = '';
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    const mult = getPricingMultiplier(m.id);
                    opt.textContent = `${m.id} (${mult})`;
                    modelSelect.appendChild(opt);
                });

                if (selectedModel && models.some(m => m.id === selectedModel)) {
                    modelSelect.value = selectedModel;
                } else if (models.length > 0) {
                    modelSelect.value = models[0].id;
                    selectedModel = models[0].id;
                    localStorage.setItem(STORAGE_KEY_MODEL, selectedModel);
                }
            } catch (e) {
                console.error('Failed to fetch models', e);
                modelSelect.innerHTML = '<option value="">Error loading models</option>';
            }
        }

        modelSelect.addEventListener('change', (e) => {
            selectedModel = e.target.value;
            localStorage.setItem(STORAGE_KEY_MODEL, selectedModel);
        });

        promptInput.addEventListener('input', updateTokenCount);

        clearBtn.addEventListener('click', () => {
            if(confirm('Are you sure you want to clear the chat history?')) {
                chatHistory = [];
                saveHistory();
                renderChat();
            }
        });

        function createMessageElement(msg, index) {
            const isUser = msg.role === 'user';
            const div = document.createElement('div');
            div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'} mb-6`;
            
            const inner = document.createElement('div');
            inner.className = `max-w-5xl w-full flex flex-col gap-3 p-5 rounded-lg border ${isUser ? 'bg-blue-50 border-blue-200' : 'bg-white border-slate-300 shadow-sm'}`;
            
            const header = document.createElement('div');
            header.className = 'flex justify-between items-center border-b pb-3 mb-1 border-slate-200 text-sm font-bold text-slate-700 uppercase tracking-wide';
            
            const roleDiv = document.createElement('div');
            roleDiv.className = 'flex items-center gap-2';
            roleDiv.innerHTML = `<i data-lucide="${isUser ? 'user' : 'bot'}" class="w-5 h-5 ${isUser ? 'text-blue-600' : 'text-slate-600'}"></i> <span>${isUser ? 'User Request' : 'AI Output'}</span>`;
            
            header.appendChild(roleDiv);
            
            if (!isUser) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'flex items-center gap-1.5 text-xs text-slate-600 hover:text-blue-700 transition-colors bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded border border-slate-200 font-semibold';
                copyBtn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i> Copy Raw`;
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(msg.content);
                    copyBtn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-600"></i> Copied`;
                    copyBtn.classList.replace('hover:text-blue-700', 'hover:text-green-700');
                    lucide.createIcons();
                    setTimeout(() => {
                        copyBtn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i> Copy Raw`;
                        copyBtn.classList.replace('hover:text-green-700', 'hover:text-blue-700');
                        lucide.createIcons();
                    }, 2000);
                };
                header.appendChild(copyBtn);
            }
            
            const content = document.createElement('div');
            content.className = 'whitespace-pre-wrap font-mono text-sm text-slate-800 break-words leading-relaxed';
            content.textContent = msg.content;
            content.id = `msg-content-${index}`;
            
            inner.appendChild(header);
            inner.appendChild(content);
            div.appendChild(inner);
            
            return div;
        }

        function renderChat() {
            chatContainer.innerHTML = '';
            if (chatHistory.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'flex flex-col items-center justify-center h-full text-slate-400 gap-4 mt-20';
                empty.innerHTML = `<i data-lucide="message-square-dashed" class="w-16 h-16 opacity-50"></i><p class="font-medium">No chat history. Start a conversation below.</p>`;
                chatContainer.appendChild(empty);
            } else {
                chatHistory.forEach((msg, i) => {
                    chatContainer.appendChild(createMessageElement(msg, i));
                });
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
            lucide.createIcons();
        }

        async function handleSend() {
            const text = promptInput.value.trim();
            if (!text) return;
            
            const tokens = countTokens(text);
            if (tokens > TOKEN_LIMIT) return;

            const userMsg = { role: 'user', content: text };
            chatHistory.push(userMsg);
            promptInput.value = '';
            updateTokenCount();
            
            const assistantIndex = chatHistory.length;
            const assistantMsg = { role: 'assistant', content: '' };
            chatHistory.push(assistantMsg);
            
            saveHistory();
            renderChat();
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing`;
            lucide.createIcons();

            try {
                const res = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: chatHistory.slice(0, -1),
                        stream: true
                    })
                });

                if (!res.ok) {
                    throw new Error(`Server returned ${res.status}`);
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder("utf-8");
                const contentEl = document.getElementById(`msg-content-${assistantIndex}`);
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    
                    let boundary = buffer.indexOf('\n');
                    while (boundary !== -1) {
                        const line = buffer.slice(0, boundary).trim();
                        buffer = buffer.slice(boundary + 1);
                        
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;
                            try {
                                const parsed = JSON.parse(dataStr);
                                const delta = parsed.choices?.[0]?.delta?.content || '';
                                if (delta) {
                                    assistantMsg.content += delta;
                                    contentEl.textContent = assistantMsg.content;
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                }
                            } catch (e) {
                                // partial or malformed chunk, safely ignore
                            }
                        }
                        boundary = buffer.indexOf('\n');
                    }
                }
            } catch (e) {
                assistantMsg.content += `\n\n[Connection Error: ${e.message}]`;
                document.getElementById(`msg-content-${assistantIndex}`).textContent = assistantMsg.content;
            } finally {
                saveHistory();
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<i data-lucide="send" class="w-5 h-5"></i> Send`;
                lucide.createIcons();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        promptInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                handleSend();
            }
        });

        // Init
        fetchModels();
        renderChat();
        updateTokenCount();
        lucide.createIcons();
    </script>
</body>
</html>
